name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes dpkg-dev libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          set -eu
          version="${GITHUB_REF_NAME}"
          package="eutheretcher-${version}-linux-x86_64"
          mkdir -p "dist/${package}"
          cp target/release/eutheretcher "dist/${package}/"
          cp README.md "dist/${package}/"
          cp LICENSE "dist/${package}/"
          mkdir -p "dist/${package}/assets"
          cp assets/eutheretcher.svg "dist/${package}/assets/"
          cp -R assets/music "dist/${package}/assets/"
          cp packaging/eutheretcher.desktop "dist/${package}/"
          cp packaging/dev.euther.EutherEtcher.policy "dist/${package}/"
          cp scripts/install-desktop.sh "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Build Debian package
        run: |
          chmod +x scripts/package-deb.sh
          scripts/package-deb.sh "${GITHUB_REF_NAME#v}" amd64

      - name: Build AppImage
        run: |
          curl --fail --location --output linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage scripts/package-appimage.sh
          LINUXDEPLOY="$PWD/linuxdeploy-x86_64.AppImage" \
            scripts/package-appimage.sh "${GITHUB_REF_NAME#v}"

      - name: Create checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.deb *.AppImage > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.AppImage
            dist/SHA256SUMS
