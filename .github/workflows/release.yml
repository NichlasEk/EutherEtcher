name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libasound2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          set -eu
          version="${GITHUB_REF_NAME}"
          package="eutheretcher-${version}-linux-x86_64"
          mkdir -p "dist/${package}"
          cp target/release/eutheretcher "dist/${package}/"
          cp README.md "dist/${package}/"
          mkdir -p "dist/${package}/assets"
          cp assets/eutheretcher.svg "dist/${package}/assets/"
          cp -R assets/music "dist/${package}/assets/"
          cp packaging/eutheretcher.desktop "dist/${package}/"
          cp packaging/dev.euther.EutherEtcher.policy "dist/${package}/"
          cp scripts/install-desktop.sh "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
